[cpu]
governor = "performance"
epp = "balance_performance"

# Uncomment and adjust if you have a Ryzen laptop with ryzenadj installed and its dkms modules
# [ryzenadj]
# stapm-limit = 25000   # Sustained TDP (mW)
# fast-limit  = 28000   # Fast boost limit (mW)
# slow-limit  = 25000   # Slow boost limit (mW)
# tctl-temp   = 95      # Thermal limit (°C)

# Named profiles — apply with: cpustate apply --profile battery
# [profiles.battery]
